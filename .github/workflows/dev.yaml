---
name: Deploy to development server

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

concurrency:
  group: devserver
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/deploy') &&
        (github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'OWNER')
      )

    runs-on: ubuntu-latest

    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput("sha", pr.data.head.sha);
            core.setOutput("clone_url", pr.data.head.repo.clone_url);
            core.setOutput("owner", pr.data.head.repo.owner.login);
            core.setOutput("repo", pr.data.head.repo.name);

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEV_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
            set -e

            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_DEFAULT_REGION=us-west-2

            APP_DIR="${{ steps.pr.outputs.owner }}/${{ steps.pr.outputs.repo }}"
            REPO_URL="${{ steps.pr.outputs.clone_url }}"

            if [ ! -d "$APP_DIR" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            git fetch origin
            git checkout ${{ steps.pr.outputs.sha }}

            python3 env-import.py

            sed -i "s/localhost/${{ secrets.DEV_HOST }}/g" .env
            sed -i "s|^GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=\"${{ secrets.DEV_GOOGLE_CLIENT_ID }}\"|" .env
            sed -i "s|^GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=\"${{ secrets.DEV_GOOGLE_CLIENT_SECRET }}\"|" .env

            echo "\n\n"
            echo "Stopping and removing all docker containers"
            echo "-------------------------------------------"
            docker stop $(docker ps -aq)
            docker rm $(docker ps -aq)

            echo "\n\n"
            echo "Starting docker instances"
            echo "-------------------------"
            docker compose pull --ignore-buildable
            docker compose up -d --build
            sleep 15

            echo "\n\n"
            echo "Logs from 15s"
            echo "-------------"
            docker compose logs
          EOF

      - name: Comment deployment result
        if: success() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `PR deployed to development server

            Commit: ${context.payload.issue.number}
            SHA: ${{ steps.pr.outputs.sha }}

            Triggered by: @${context.actor}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Comment deployment failure
        if: failure() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Deployment to dev server failed. Check the GitHub Actions logs."
            });
