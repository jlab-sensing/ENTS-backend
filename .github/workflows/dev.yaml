---
name: Deploy to development server

permissions:
  contents: read

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEV_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << EOF
            set -e

            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_DEFAULT_REGION=us-west-2

            APP_DIR="${{ github.repository }}"

            if [ ! -d "\$APP_DIR" ]; then
              git clone ${{ github.server_url }}/${{ github.repository }} \$APP_DIR
            fi

            cd \$APP_DIR

            echo \$AWS_PROFILE

            git fetch origin
            git checkout ${{ github.sha }}

            python3 env-import.py

            docker compose down
            docker compose pull
            docker compose up -d --build
            sleep 15
            docker compose logs
          EOF
