---
name: Lint and test

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      ENV_FILE: ci.env

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build services
        run:
          docker compose --profile lint build

      - name: Lint backend
        run: docker compose up backend-lint --abort-on-container-failure

      - name: Lint frontend
        run: docker compose up frontend-lint --abort-on-container-failure

  test:
    runs-on: ubuntu-latest
    env:
      ENV_FILE: ci.env

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build services
        run:
          docker compose --profile test build

      - name: Start services
        run:
          docker compose up -d

      - name: Wait for services to start
        run: sleep 10s

      - name: Save timestamp
        id: timestamp
        run: echo "start_time=$(date -Is)" >> $GITHUB_OUTPUT

      - name: Run backend tests
        run: docker compose up backend-test --abort-on-container-failure

      - name: Run frontend tests
        run: docker compose up frontend-test --abort-on-container-failure

      - name: Save all logs
        if: always()
        run: docker compose logs -t > dirtviz.log

      - name: Save short logs
        if: always()
        run: |
          SINCE="${{ steps.timestamp.outputs.start_time }}"
          if [ -n "$SINCE" ]; then
            docker compose logs -t --since "$SINCE" > dirtviz_short.log
          else
            docker compose logs -t > dirtviz_short.log
          fi

      - name: Check for errors
        run: "! grep -i 'error' dirtviz_short.log"

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: DirtViz Logs
          path: |
            dirtviz.log
            dirtviz_short.log

      - name: Upload backend coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/.coverage
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload frontend coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
